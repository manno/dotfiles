name: Bump Neovim Plugins

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: 'stable'
          cache: false

      - name: Check and bump plugins
        id: bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run scripts/bump-nvim-plugins.go

      - name: Open pull request
        if: steps.bump.outputs.has_updates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="bump/nvim-plugins-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the branch.
          if git ls-remote --exit-code --heads origin "${BRANCH}" >/dev/null 2>&1; then
            git checkout "${BRANCH}"
            git reset --hard HEAD
          else
            git checkout -b "${BRANCH}"
          fi

          git add dot_config/nvim/lua/
          git diff --cached --quiet && { echo "Nothing to commit"; exit 0; }
          git commit -m "${{ steps.bump.outputs.pr_title }}"
          git push origin "${BRANCH}"

          # Update existing PR or create a new one.
          EXISTING=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number // empty')
          if [ -n "${EXISTING}" ]; then
            gh pr edit "${EXISTING}" \
              --title "${{ steps.bump.outputs.pr_title }}" \
              --body-file .github/pr-body.md
            echo "Updated existing PR #${EXISTING}"
          else
            gh pr create \
              --title "${{ steps.bump.outputs.pr_title }}" \
              --body-file .github/pr-body.md \
              --base main \
              --head "${BRANCH}"
          fi
